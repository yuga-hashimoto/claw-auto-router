name: Publish Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Read npm registry version
        id: registry
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
        run: |
          VERSION="$(npm view "$PACKAGE_NAME" version 2>/dev/null || true)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check existing GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if gh release view "v$PACKAGE_VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide release actions
        id: publish_check
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          REGISTRY_VERSION: ${{ steps.registry.outputs.version }}
          RELEASE_EXISTS: ${{ steps.release.outputs.exists }}
        run: |
          if [ -n "$REGISTRY_VERSION" ] && [ "$PACKAGE_VERSION" = "$REGISTRY_VERSION" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION is already on npm. Skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Publishing $PACKAGE_NAME@$PACKAGE_VERSION"
          fi

          if [ "$RELEASE_EXISTS" = "true" ]; then
            echo "should_create_release=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Release v$PACKAGE_VERSION already exists. Skipping release creation."
          else
            echo "should_create_release=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Release v$PACKAGE_VERSION will be created."
          fi

      - name: Publish to npm
        if: steps.publish_check.outputs.should_publish == 'true'
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          set +e
          PUBLISH_OUTPUT="$(npm publish 2>&1)"
          PUBLISH_STATUS=$?
          set -e

          echo "$PUBLISH_OUTPUT"

          if [ "$PUBLISH_STATUS" -eq 0 ]; then
            exit 0
          fi

          sleep 5
          VERSION="$(npm view "$PACKAGE_NAME" version 2>/dev/null || true)"
          if [ "$VERSION" = "$PACKAGE_VERSION" ]; then
            echo "Version $PACKAGE_VERSION is already on npm after publish retry check. Treating as success."
            exit 0
          fi

          exit "$PUBLISH_STATUS"

      - name: Create GitHub Release
        if: steps.publish_check.outputs.should_create_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          gh release create "v$PACKAGE_VERSION" \
            --title "v$PACKAGE_VERSION" \
            --target "$GITHUB_SHA" \
            --generate-notes
